spring:
  application:
    name: SimulaInvest

  # Configuração de persistência de dados (H2 Database)
  datasource:
    url: jdbc:h2:file:./data/simulainvestdb
    driverClassName: org.h2.Driver
    username: sa
    password: password

  jpa:
    hibernate:
      ddl-auto: update # Atualiza o esquema do banco automaticamente
    show-sql: true # Mostra os comandos SQL no console
    properties:
      hibernate:
        format_sql: true

  # Habilita o console do H2 para você visualizar as tabelas no navegador
  h2:
    console:
      enabled: true
      path: /h2-console